name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - canary
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Prepare deployment bundle
        shell: bash
        env:
          DEPLOY_CATWLK_APP_NETWORK: ${{ secrets.DEPLOY_CATWLK_APP_NETWORK }}
        run: |
          set -euo pipefail
          bundle_root="${RUNNER_TEMP}/bundle"
          mkdir -p "${bundle_root}/envs/${{ inputs.environment }}" "${bundle_root}/sites"
          cp compose.yml "${bundle_root}/compose.yml"
          cp "envs/${{ inputs.environment }}/compose.yml" "${bundle_root}/envs/${{ inputs.environment }}/compose.yml"
          cp "envs/${{ inputs.environment }}/.env.proxy" "${bundle_root}/envs/${{ inputs.environment }}/.env.proxy"
          cp sites/catwlk.conf.template "${bundle_root}/sites/catwlk.conf.template"
          cat > "${bundle_root}/envs/${{ inputs.environment }}/.env.deploy" <<EOF
          MAKEPAD_PROXY_APP_NETWORK=${DEPLOY_CATWLK_APP_NETWORK}
          EOF

      - name: Deploy via Docker Swarm
        shell: bash
        env:
          REMOTE_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_USER: ${{ secrets.DEPLOY_SSH_USER }}
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
          STACK_NAME: ${{ secrets.DEPLOY_STACK_NAME }}
        run: |
          set -euo pipefail
          : "${REMOTE_HOST:?}" "${REMOTE_USER:?}" "${REMOTE_DIR:?}" "${STACK_NAME:?}"
          bundle_root="${RUNNER_TEMP}/bundle"
          remote_port=${REMOTE_PORT:-22}
          ssh_opts=(-o StrictHostKeyChecking=accept-new -p "${remote_port}")
          scp_opts=(-o StrictHostKeyChecking=accept-new -P "${remote_port}")
          remote_target="${REMOTE_USER}@${REMOTE_HOST}"

          ssh "${ssh_opts[@]}" "${remote_target}" mkdir -p "${REMOTE_DIR}/envs/${{ inputs.environment }}" "${REMOTE_DIR}/sites"
          scp "${scp_opts[@]}" "${bundle_root}/compose.yml" "${remote_target}:${REMOTE_DIR}/compose.yml"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/compose.yml" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/compose.yml"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/.env.proxy" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/.env.proxy"
          scp "${scp_opts[@]}" "${bundle_root}/envs/${{ inputs.environment }}/.env.deploy" "${remote_target}:${REMOTE_DIR}/envs/${{ inputs.environment }}/.env.deploy"
          scp "${scp_opts[@]}" "${bundle_root}/sites/catwlk.conf.template" "${remote_target}:${REMOTE_DIR}/sites/catwlk.conf.template"

          ssh "${ssh_opts[@]}" "${remote_target}" bash -se -- "${REMOTE_DIR}" "${STACK_NAME}" "${{ inputs.environment }}" <<'EOF'
          set -euo pipefail
          remote_dir=$1
          stack_name=$2
          deploy_env=$3
          env_deploy="${remote_dir}/envs/${deploy_env}/.env.deploy"
          app_network=$(grep '^MAKEPAD_PROXY_APP_NETWORK=' "${env_deploy}" | tail -n 1 | cut -d= -f2-)

          docker network inspect "${app_network}" >/dev/null 2>&1 \
            || docker network create --driver overlay --attachable "${app_network}"

          MAKEPAD_PROXY_APP_NETWORK="${app_network}" docker compose \
            --env-file "${remote_dir}/envs/${deploy_env}/.env.proxy" \
            --env-file "${env_deploy}" \
            -f "${remote_dir}/compose.yml" \
            -f "${remote_dir}/envs/${deploy_env}/compose.yml" \
            config > "${remote_dir}/stack.yml"

          docker stack deploy --compose-file "${remote_dir}/stack.yml" "${stack_name}"
          EOF
