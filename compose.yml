configs:
  common_conf:
    file: ./sites/00-common.conf.template
  catwlk_prod_conf:
    file: ./sites/catwlk-prod.conf.template
  catwlk_canary_conf:
    file: ./sites/catwlk-canary.conf.template
  alerteconso_prod_conf:
    file: ./sites/alerteconso-prod.conf.template
  le_petit_coin_prod_conf:
    file: ./sites/le-petit-coin-prod.conf.template
  vif_prod_conf:
    file: ./sites/vif-prod.conf.template
  makepad_landing_prod_conf:
    file: ./sites/makepad-landing-prod.conf.template
  evidella_prod_conf:
    file: ./sites/evidella-prod.conf.template
  fashion_crawler_admin_prod_conf:
    file: ./sites/fashion-crawler-admin-prod.conf.template

services:
  nginx:
    image: nginx:1.28-alpine
    environment:
      CATWLK_PROD_SERVER_NAME: ${CATWLK_PROD_SERVER_NAME:-localhost}
      CATWLK_CANARY_SERVER_NAME: ${CATWLK_CANARY_SERVER_NAME:-canary.localhost}
      ALERTECONSO_PROD_SERVER_NAME: ${ALERTECONSO_PROD_SERVER_NAME:-alerteconso.localhost}
      LE_PETIT_COIN_PROD_SERVER_NAME: ${LE_PETIT_COIN_PROD_SERVER_NAME:-aupetitcoin.localhost}
      LE_PETIT_COIN_PROD_UPSTREAM: ${LE_PETIT_COIN_PROD_UPSTREAM:-http://le-petit-coin-backend:8080}
      VIF_PROD_SERVER_NAME: ${VIF_PROD_SERVER_NAME:-vif.localhost}
      VIF_PROD_UPSTREAM: ${VIF_PROD_UPSTREAM:-http://vif-apisix:9080}
      MAKEPAD_LANDING_PROD_SERVER_NAME: ${MAKEPAD_LANDING_PROD_SERVER_NAME:-makepad.localhost}
      MAKEPAD_LANDING_WWW_SERVER_NAME: ${MAKEPAD_LANDING_WWW_SERVER_NAME:-www.makepad.localhost}
      MAKEPAD_LANDING_PROD_UPSTREAM: ${MAKEPAD_LANDING_PROD_UPSTREAM:-http://makepad-landing-prod-app:8080}
      EVIDELLA_PROD_SERVER_NAME: ${EVIDELLA_PROD_SERVER_NAME:-evidella.localhost}
      EVIDELLA_WWW_SERVER_NAME: ${EVIDELLA_WWW_SERVER_NAME:-www.evidella.localhost}
      EVIDELLA_PROD_UPSTREAM: ${EVIDELLA_PROD_UPSTREAM:-http://opsbrainlanding-prod-app:8080}
      FASHION_CRAWLER_ADMIN_PROD_SERVER_NAME: ${FASHION_CRAWLER_ADMIN_PROD_SERVER_NAME:-fashion.localhost}
      FASHION_CRAWLER_ADMIN_PROD_UPSTREAM: ${FASHION_CRAWLER_ADMIN_PROD_UPSTREAM:-http://fashion-crawler-admin:8088}
      CATWLK_TLS_CERT_FILE: ${CATWLK_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      CATWLK_TLS_KEY_FILE: ${CATWLK_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      ALERTECONSO_TLS_CERT_FILE: ${ALERTECONSO_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      ALERTECONSO_TLS_KEY_FILE: ${ALERTECONSO_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      LE_PETIT_COIN_TLS_CERT_FILE: ${LE_PETIT_COIN_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      LE_PETIT_COIN_TLS_KEY_FILE: ${LE_PETIT_COIN_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      VIF_TLS_CERT_FILE: ${VIF_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      VIF_TLS_KEY_FILE: ${VIF_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      MAKEPAD_LANDING_TLS_CERT_FILE: ${MAKEPAD_LANDING_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      MAKEPAD_LANDING_TLS_KEY_FILE: ${MAKEPAD_LANDING_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      EVIDELLA_TLS_CERT_FILE: ${EVIDELLA_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      EVIDELLA_TLS_KEY_FILE: ${EVIDELLA_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      FASHION_CRAWLER_ADMIN_TLS_CERT_FILE: ${FASHION_CRAWLER_ADMIN_TLS_CERT_FILE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      FASHION_CRAWLER_ADMIN_TLS_KEY_FILE: ${FASHION_CRAWLER_ADMIN_TLS_KEY_FILE:-/etc/letsencrypt/live/localhost/privkey.pem}
      CATWLK_ACME_WEBROOT: ${CATWLK_ACME_WEBROOT:-/var/lib/letsencrypt}
    configs:
      - source: common_conf
        target: /etc/nginx/templates/00-common.conf.template
      - source: catwlk_prod_conf
        target: /etc/nginx/templates/catwlk-prod.conf.template
      - source: catwlk_canary_conf
        target: /etc/nginx/templates/catwlk-canary.conf.template
      - source: alerteconso_prod_conf
        target: /etc/nginx/templates/alerteconso-prod.conf.template
      - source: le_petit_coin_prod_conf
        target: /etc/nginx/templates/le-petit-coin-prod.conf.template
      - source: vif_prod_conf
        target: /etc/nginx/templates/vif-prod.conf.template
      - source: makepad_landing_prod_conf
        target: /etc/nginx/templates/makepad-landing-prod.conf.template
      - source: evidella_prod_conf
        target: /etc/nginx/templates/evidella-prod.conf.template
      - source: fashion_crawler_admin_prod_conf
        target: /etc/nginx/templates/fashion-crawler-admin-prod.conf.template
    networks:
      - prod_app
      - canary_app
      - alerteconso_prod_app
      - le_petit_coin_prod_app
      - vif_prod_app
      - makepad_landing_prod_app
      - evidella_prod_app
      - fashion_crawler_admin_prod_app

  fashion-crawler-admin-oauth2-proxy:
    image: ${FASHION_CRAWLER_ADMIN_OAUTH2_PROXY_IMAGE:-quay.io/oauth2-proxy/oauth2-proxy:v7.15.3}
    environment:
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${FASHION_CRAWLER_ADMIN_OIDC_ISSUER_URL:-https://auth.makepad.fr/realms/makepad}
      OAUTH2_PROXY_CLIENT_ID: ${FASHION_CRAWLER_ADMIN_OAUTH_CLIENT_ID:-fashion-crawler-admin}
      OAUTH2_PROXY_CLIENT_SECRET: ${FASHION_CRAWLER_ADMIN_OAUTH_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${FASHION_CRAWLER_ADMIN_OAUTH_COOKIE_SECRET:-}
      OAUTH2_PROXY_COOKIE_NAME: ${FASHION_CRAWLER_ADMIN_OAUTH_COOKIE_NAME:-_fashion_crawler_admin_session}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_EMAIL_DOMAINS: ${FASHION_CRAWLER_ADMIN_OAUTH_EMAIL_DOMAINS:-*}
      OAUTH2_PROXY_REDIRECT_URL: ${FASHION_CRAWLER_ADMIN_OAUTH_REDIRECT_URL:-https://fashion.makepad.fr/oauth2/callback}
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "false"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_SCOPE: "openid email profile"
    networks:
      - fashion_crawler_admin_prod_app

networks:
  prod_app:
  canary_app:
  alerteconso_prod_app:
  le_petit_coin_prod_app:
  vif_prod_app:
  makepad_landing_prod_app:
  evidella_prod_app:
  fashion_crawler_admin_prod_app:
