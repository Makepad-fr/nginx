services:
  nginx:
    env_file:
      - ./envs/production/.env.proxy
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - "${CATWLK_PROXY_LETSENCRYPT_HOST_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro"
      - "${CATWLK_PROXY_ACME_WEBROOT_HOST_PATH:-/var/lib/letsencrypt}:/var/lib/letsencrypt:ro"
    logging:
      driver: json-file
      options:
        max-size: "${MAKEPAD_PROXY_LOG_MAX_SIZE:-20m}"
        max-file: "${MAKEPAD_PROXY_LOG_MAX_FILES:-5}"
    deploy:
      replicas: ${MAKEPAD_PROXY_REPLICAS:-1}
      placement:
        constraints:
          - node.labels.infra.makepad.proxy == true
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: "${MAKEPAD_PROXY_CPU_LIMIT:-1.0}"
          memory: ${MAKEPAD_PROXY_MEMORY_LIMIT:-512M}
        reservations:
          cpus: "${MAKEPAD_PROXY_CPU_RESERVATION:-0.1}"
          memory: ${MAKEPAD_PROXY_MEMORY_RESERVATION:-64M}

networks:
  prod_app:
    external: true
    name: ${MAKEPAD_PROXY_PROD_APP_NETWORK}
  canary_app:
    external: true
    name: ${MAKEPAD_PROXY_CANARY_APP_NETWORK}
  alerteconso_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_ALERTECONSO_APP_NETWORK}
  le_petit_coin_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_LE_PETIT_COIN_APP_NETWORK}
  vif_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_VIF_APP_NETWORK}
  makepad_landing_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_MAKEPAD_LANDING_APP_NETWORK}
  evidella_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_EVIDELLA_APP_NETWORK}
  openpanel_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_OPENPANEL_APP_NETWORK}
  runtrace_prod_app:
    external: true
    name: ${MAKEPAD_PROXY_RUNTRACE_APP_NETWORK}
